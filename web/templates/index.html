<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SingBoxA</title>
    <link rel="stylesheet" href="/static/css/tailwind.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="app-body" x-data="app()" x-init="init()">
    <div class="app-shell">
        <aside class="app-sidebar">
            <div class="brand-row">
                <div class="brand-mark">S</div>
                <div class="brand-copy">
                    <h1>SingBoxA</h1>
                    <span x-text="status.state === 'running' ? '运行中' : '已停止'"></span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <template x-for="item in navItems" :key="item.key">
                    <button @click="setTab(item.key)"
                            :class="currentTab === item.key ? 'is-active' : ''"
                            class="nav-item">
                        <span class="nav-icon" x-html="item.icon"></span>
                        <span x-text="item.label"></span>
                    </button>
                </template>
            </nav>

            <div class="sidebar-status">
                <div>
                    <span>模式</span>
                    <strong x-text="getModeText(status.proxy_mode)"></strong>
                </div>
                <div>
                    <span>节点</span>
                    <strong x-text="nodes.length"></strong>
                </div>
                <div>
                    <span>当前</span>
                    <strong class="truncate" x-text="getSelectedNodeText()"></strong>
                </div>
            </div>
        </aside>

        <section class="workspace">
            <header class="workspace-header">
                <h2 x-text="getPageTitle()"></h2>
                <div class="header-meta">
                    <span class="status-chip" :class="getStatusBadgeClass()"
                          x-text="status.state === 'running' ? '服务运行中' : '服务已停止'"></span>
                    <span class="meta-chip" x-text="'测速: ' + getCurrentTestURLModeLabel()"></span>
                </div>
            </header>

            <main class="workspace-main">
                <section x-show="currentTab === 'dashboard'" class="page-view">
                    <div class="dashboard-grid">
                        <section class="control-panel span-2">
                            <div class="panel-title-row">
                                <div>
                                    <h3>运行控制</h3>
                                    <p x-text="getDashboardAdvice()"></p>
                                </div>
                                <span class="status-chip" :class="getStatusBadgeClass()"
                                      x-text="status.state === 'running' ? '运行中' : '已停止'"></span>
                            </div>

                            <div class="action-row">
                                <button @click="startService()"
                                        :disabled="status.state === 'running' || loading"
                                        class="button is-success">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M8 5v14l11-7z"></path>
                                    </svg>
                                    启动
                                </button>
                                <button @click="stopService()"
                                        :disabled="status.state !== 'running' || loading"
                                        class="button is-danger">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M6 6h12v12H6z"></path>
                                    </svg>
                                    停止
                                </button>
                                <button @click="restartService()"
                                        :disabled="loading"
                                        class="button is-primary">
                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.76-4.24L13 11h8V3z"></path>
                                    </svg>
                                    重启
                                </button>
                                <button @click="refreshSubscriptions()"
                                        :disabled="loading"
                                        class="button">
                                    <svg viewBox="0 0 24 24" aria-hidden="true" :class="loading ? 'spin' : ''">
                                        <path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.76-4.24L13 11h8V3z"></path>
                                    </svg>
                                    刷新订阅
                                </button>
                            </div>
                        </section>

                        <section class="metric-panel">
                            <span>当前节点</span>
                            <strong x-text="getSelectedNodeText()"></strong>
                            <small x-show="status.effective_node" x-text="'命中 ' + status.effective_node"></small>
                        </section>

                        <section class="metric-panel">
                            <span>订阅</span>
                            <strong x-text="subscriptions.length"></strong>
                            <small x-text="getAutoUpdateSubscriptionCount() + ' 个自动更新'"></small>
                        </section>

                        <section class="mode-panel span-2">
                            <div class="panel-title-row compact">
                                <h3>代理模式</h3>
                                <span x-text="getModeText(status.proxy_mode)"></span>
                            </div>
                            <div class="segmented">
                                <button @click="setProxyMode('rule')"
                                        :class="status.proxy_mode === 'rule' ? 'is-active' : ''">
                                    规则
                                </button>
                                <button @click="setProxyMode('global')"
                                        :class="status.proxy_mode === 'global' ? 'is-active' : ''">
                                    全局
                                </button>
                                <button @click="setProxyMode('direct')"
                                        :class="status.proxy_mode === 'direct' ? 'is-active' : ''">
                                    直连
                                </button>
                            </div>
                        </section>

                        <section class="metric-panel">
                            <span>节点</span>
                            <strong x-text="nodes.length"></strong>
                            <small x-text="getHealthyNodeCount() + ' 个健康'"></small>
                        </section>

                        <section class="metric-panel">
                            <span>测速内核</span>
                            <strong x-text="getTesterLabel()"></strong>
                            <small x-show="status.testing_total > 0"
                                   x-text="status.testing_completed + '/' + status.testing_total"></small>
                        </section>
                    </div>
                </section>

                <section x-show="currentTab === 'nodes'" x-cloak class="page-view">
                    <div class="page-toolbar">
                        <div class="toolbar-stats">
                            <div>
                                <span>策略</span>
                                <strong x-text="status.selected_mode === 'auto' ? '自动选择' : '手动节点'"></strong>
                            </div>
                            <div>
                                <span>推荐</span>
                                <strong x-text="status.recommended_node || '-'"></strong>
                            </div>
                            <div>
                                <span>测速</span>
                                <strong x-text="status.testing_total > 0 ? status.testing_completed + '/' + status.testing_total : getCurrentTestURLModeLabel()"></strong>
                            </div>
                        </div>
                        <button @click="testAllNodes()"
                                :disabled="loading || testing"
                                class="button is-primary">
                            <svg viewBox="0 0 24 24" aria-hidden="true" :class="testing ? 'spin' : ''">
                                <path d="M13 2 4 14h7l-1 8 10-13h-7z"></path>
                            </svg>
                            一键测速
                        </button>
                    </div>

                    <div class="table-panel">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>
                                            <button @click="toggleNodeSort('name')" class="table-sort">
                                                节点 <span x-text="getNodeSortIndicator('name')"></span>
                                            </button>
                                        </th>
                                        <th>类型</th>
                                        <th>订阅</th>
                                        <th>服务器</th>
                                        <th>
                                            <button @click="toggleNodeSort('latency')" class="table-sort">
                                                延迟 <span x-text="getNodeSortIndicator('latency')"></span>
                                            </button>
                                        </th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="node in sortedNodes" :key="node.name">
                                        <tr :class="node.selected ? 'is-selected' : ''">
                                            <td>
                                                <div class="cell-main">
                                                    <strong x-text="node.name === 'auto' ? '自动选择' : node.name"></strong>
                                                    <small x-show="node.virtual && node.effective_node"
                                                           x-text="'命中 ' + node.effective_node"></small>
                                                    <small x-show="node.virtual && node.recommended_node && node.recommended_node !== node.effective_node"
                                                           x-text="'推荐 ' + node.recommended_node"></small>
                                                </div>
                                            </td>
                                            <td><span class="tag" x-text="node.type"></span></td>
                                            <td class="muted">
                                                <span x-show="node.subscription_names && node.subscription_names.length"
                                                      x-text="node.subscription_names.join(', ')"></span>
                                                <span x-show="!node.subscription_names || !node.subscription_names.length">-</span>
                                            </td>
                                            <td class="muted">
                                                <span x-show="!node.virtual" x-text="node.server + ':' + node.port"></span>
                                                <span x-show="node.virtual">自动选择</span>
                                            </td>
                                            <td>
                                                <span x-show="node.latency > 0 && node.latency < 999"
                                                      :class="'latency-chip ' + getNodeLatencyClass(node.latency)"
                                                      x-text="node.latency + 'ms'"></span>
                                                <span x-show="node.latency === 999" class="latency-chip is-bad">999ms</span>
                                                <span x-show="node.latency === -1" class="latency-chip is-bad">超时</span>
                                                <span x-show="!node.latency && node.latency !== -1" class="latency-chip is-idle">未测</span>
                                            </td>
                                            <td>
                                                <div class="row-actions">
                                                    <button @click="selectNode(node.name)"
                                                            :disabled="node.selected"
                                                            class="button is-small">
                                                        <span x-text="node.virtual ? '启用' : '选择'"></span>
                                                    </button>
                                                    <button @click="applyRecommendedNode()"
                                                            x-show="node.virtual"
                                                            :disabled="!canApplyRecommended(node)"
                                                            class="button is-small">
                                                        推荐
                                                    </button>
                                                    <button @click="testNodeByName(node.name)"
                                                            x-show="!node.virtual"
                                                            :disabled="node.testing"
                                                            class="button is-small">
                                                        <span x-show="node.testing" class="spinner"></span>
                                                        <span x-show="!node.testing">测速</span>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                    <tr x-show="nodes.length === 0">
                                        <td colspan="6" class="empty-state">暂无节点，请先添加订阅</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section x-show="currentTab === 'subscriptions'" x-cloak class="page-view">
                    <div class="page-toolbar">
                        <div class="toolbar-stats">
                            <div>
                                <span>订阅</span>
                                <strong x-text="subscriptions.length"></strong>
                            </div>
                            <div>
                                <span>自动更新</span>
                                <strong x-text="getAutoUpdateSubscriptionCount()"></strong>
                            </div>
                            <div>
                                <span>24h 内更新</span>
                                <strong x-text="getRecentSubscriptionCount()"></strong>
                            </div>
                        </div>
                        <div class="toolbar-actions">
                            <button @click="refreshSubscriptions()" :disabled="loading" class="button">
                                <svg viewBox="0 0 24 24" aria-hidden="true" :class="loading ? 'spin' : ''">
                                    <path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.76-4.24L13 11h8V3z"></path>
                                </svg>
                                刷新
                            </button>
                            <button @click="showAddSubscription = true" class="button is-primary">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M11 5h2v14h-2z"></path>
                                    <path d="M5 11h14v2H5z"></path>
                                </svg>
                                添加
                            </button>
                        </div>
                    </div>

                    <div class="table-panel">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>名称</th>
                                        <th>地址</th>
                                        <th>自动更新</th>
                                        <th>间隔</th>
                                        <th>上次更新</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="sub in subscriptions" :key="sub.id">
                                        <tr>
                                            <td><strong x-text="sub.name"></strong></td>
                                            <td class="muted"><span class="url-cell" x-text="sub.url"></span></td>
                                            <td>
                                                <span class="tag" :class="getSubscriptionStatusClass(sub)"
                                                      x-text="sub.auto_update ? '开启' : '关闭'"></span>
                                            </td>
                                            <td class="muted">
                                                <span x-text="sub.auto_update ? (sub.update_interval || 60) + ' 分钟' : '-'"></span>
                                            </td>
                                            <td class="muted" x-text="sub.updated_at ? formatDate(sub.updated_at) : '-'"></td>
                                            <td>
                                                <div class="row-actions">
                                                    <button @click="openEditSubscription(sub)" class="icon-button" title="编辑">
                                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                                            <path d="M5 18.1V21h2.9L18.4 10.5l-2.9-2.9z"></path>
                                                            <path d="m19.3 9.6-2.9-2.9 1.4-1.4a1 1 0 0 1 1.4 0l1.5 1.5a1 1 0 0 1 0 1.4z"></path>
                                                        </svg>
                                                    </button>
                                                    <button @click="refreshSubscription(sub)" class="icon-button" title="刷新">
                                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                                            <path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.76-4.24L13 11h8V3z"></path>
                                                        </svg>
                                                    </button>
                                                    <button @click="deleteSubscription(sub.id)" class="icon-button is-danger" title="删除">
                                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                                            <path d="M7 21h10l1-13H6z"></path>
                                                            <path d="M9 4h6l1 2h4v2H4V6h4z"></path>
                                                        </svg>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                    <tr x-show="subscriptions.length === 0">
                                        <td colspan="6" class="empty-state">
                                            暂无订阅
                                            <button @click="showAddSubscription = true" class="button is-small is-primary">添加订阅</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section x-show="currentTab === 'settings'" x-cloak class="page-view">
                    <div class="settings-layout">
                        <nav class="settings-nav">
                            <button @click="setSettingsSection('basic')"
                                    :class="settingsSection === 'basic' ? 'is-active' : ''">基础</button>
                            <button @click="setSettingsSection('routing')"
                                    :class="settingsSection === 'routing' ? 'is-active' : ''">路由</button>
                            <button @click="setSettingsSection('bypass')"
                                    :class="settingsSection === 'bypass' ? 'is-active' : ''">绕过</button>
                            <button @click="setSettingsSection('diagnostics')"
                                    :class="settingsSection === 'diagnostics' ? 'is-active' : ''">诊断</button>
                        </nav>

                        <div class="settings-content">
                            <template x-if="settingsSection === 'basic'">
                                <section class="settings-section">
                                    <template x-if="appConfig && appConfig.proxy && appConfig.dns">
                                        <div class="settings-grid">
                                            <div class="form-panel">
                                                <h3>DNS</h3>
                                                <div class="form-grid two">
                                                    <label>
                                                        <span>国内 DNS</span>
                                                        <template x-for="(dns, i) in appConfig.dns.domestic_servers || []" :key="i">
                                                            <input type="text" :value="dns"
                                                                   @input="appConfig.dns.domestic_servers[i] = $event.target.value">
                                                        </template>
                                                    </label>
                                                    <label>
                                                        <span>代理 DNS</span>
                                                        <template x-for="(dns, i) in appConfig.dns.proxy_servers || []" :key="i">
                                                            <input type="text" :value="dns"
                                                                   @input="appConfig.dns.proxy_servers[i] = $event.target.value">
                                                        </template>
                                                    </label>
                                                </div>
                                            </div>

                                            <div class="form-panel">
                                                <h3>代理端口</h3>
                                                <div class="form-grid two">
                                                    <label>
                                                        <span>SOCKS5</span>
                                                        <input type="number" x-model.number="appConfig.proxy.socks5_port"
                                                               min="0" max="65535" placeholder="0 表示禁用">
                                                    </label>
                                                    <label>
                                                        <span>HTTP</span>
                                                        <input type="number" x-model.number="appConfig.proxy.http_proxy_port"
                                                               min="0" max="65535" placeholder="0 表示禁用">
                                                    </label>
                                                </div>
                                            </div>

                                            <div class="form-panel">
                                                <h3>TUN</h3>
                                                <label class="toggle-row">
                                                    <input type="checkbox" x-model="appConfig.proxy.tun_enabled">
                                                    <span>启用 TUN 模式</span>
                                                </label>
                                                <div x-show="appConfig.proxy.tun_enabled" class="form-grid two">
                                                    <label>
                                                        <span>TUN 地址</span>
                                                        <input type="text" x-model="appConfig.proxy.tun_address">
                                                    </label>
                                                    <label class="toggle-row inline">
                                                        <input type="checkbox" x-model="appConfig.proxy.auto_route">
                                                        <span>自动路由</span>
                                                    </label>
                                                    <label class="toggle-row inline">
                                                        <input type="checkbox" x-model="appConfig.proxy.strict_route">
                                                        <span>严格路由</span>
                                                    </label>
                                                </div>
                                            </div>

                                            <div class="form-panel">
                                                <h3>测速与缓存</h3>
                                                <div class="form-grid two">
                                                    <label>
                                                        <span>节点偏好</span>
                                                        <select x-model="appConfig.node_selection_preference">
                                                            <option value="auto">自动</option>
                                                            <option value="us">美国</option>
                                                            <option value="sg">新加坡</option>
                                                            <option value="tw">台湾</option>
                                                            <option value="hk">香港</option>
                                                        </select>
                                                    </label>
                                                    <label>
                                                        <span>测速目标</span>
                                                        <select x-model="appConfig.proxy.test_url_mode">
                                                            <option value="gstatic">Google Gstatic</option>
                                                            <option value="youtube_ggpht">YouTube</option>
                                                            <option value="skk">SKK</option>
                                                            <option value="jsdelivr">jsDelivr</option>
                                                            <option value="github">GitHub</option>
                                                        </select>
                                                    </label>
                                                    <label>
                                                        <span>测速线程</span>
                                                        <select x-model.number="appConfig.proxy.test_workers">
                                                            <option :value="1">1</option>
                                                            <option :value="2">2</option>
                                                            <option :value="3">3</option>
                                                            <option :value="4">4</option>
                                                            <option :value="5">5</option>
                                                        </select>
                                                    </label>
                                                    <div class="button-stack">
                                                        <span>DNS 缓存</span>
                                                        <button @click="clearCache()"
                                                                :disabled="clearingCache"
                                                                class="button">
                                                            <span x-text="clearingCache ? '清空中...' : '清空 DNS 缓存'"></span>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="settings-actions">
                                                <button @click="saveConfig()" class="button is-primary">保存设置</button>
                                            </div>
                                        </div>
                                    </template>
                                    <div x-show="!appConfig || !appConfig.proxy" class="empty-state">加载配置中...</div>
                                </section>
                            </template>

                            <template x-if="settingsSection === 'routing'">
                                <section class="settings-section">
                                    <div class="form-panel">
                                        <div class="panel-title-row compact">
                                            <h3>代理模式</h3>
                                            <span x-text="getModeText(status.proxy_mode)"></span>
                                        </div>
                                        <div class="segmented">
                                            <button @click="setProxyMode('rule')"
                                                    :class="status.proxy_mode === 'rule' ? 'is-active' : ''">规则</button>
                                            <button @click="setProxyMode('global')"
                                                    :class="status.proxy_mode === 'global' ? 'is-active' : ''">全局</button>
                                            <button @click="setProxyMode('direct')"
                                                    :class="status.proxy_mode === 'direct' ? 'is-active' : ''">直连</button>
                                        </div>
                                    </div>

                                    <div class="form-panel">
                                        <div class="panel-title-row compact">
                                            <h3>自定义规则</h3>
                                            <button @click="showAddRule = true" class="button is-small is-primary">添加</button>
                                        </div>
                                        <div class="rule-list">
                                            <template x-for="(rule, index) in rulesInfo.custom_rules" :key="index">
                                                <div class="rule-row">
                                                    <span class="tag" x-text="rule.type"></span>
                                                    <strong x-text="rule.value"></strong>
                                                    <span class="muted">→</span>
                                                    <span x-text="rule.outbound"></span>
                                                    <button @click="removeCustomRule(index)" class="icon-button is-danger" title="删除">
                                                        <svg viewBox="0 0 24 24" aria-hidden="true">
                                                            <path d="m6 7 11 11 1-1L7 6z"></path>
                                                            <path d="M17 6 6 17l1 1L18 7z"></path>
                                                        </svg>
                                                    </button>
                                                </div>
                                            </template>
                                            <p x-show="!rulesInfo.custom_rules || rulesInfo.custom_rules.length === 0"
                                               class="empty-state compact">暂无自定义规则</p>
                                        </div>
                                    </div>

                                    <details class="details-panel">
                                        <summary>内置规则 <span x-text="rulesInfo.default_rules.length"></span></summary>
                                        <div class="rule-list">
                                            <template x-for="rule in rulesInfo.default_rules" :key="rule.name">
                                                <div class="rule-row">
                                                    <strong x-text="rule.name"></strong>
                                                    <span class="muted" x-text="rule.description"></span>
                                                    <span class="tag is-success">启用</span>
                                                </div>
                                            </template>
                                        </div>
                                        <button @click="refreshRules()" class="button is-small">更新规则</button>
                                    </details>
                                </section>
                            </template>

                            <template x-if="settingsSection === 'bypass'">
                                <section class="settings-section">
                                    <div class="page-toolbar">
                                        <div class="toolbar-stats">
                                            <div>
                                                <span>默认网关</span>
                                                <strong x-text="bypassInfo.gateway || '-'"></strong>
                                            </div>
                                            <div>
                                                <span>接口</span>
                                                <strong x-text="bypassInfo.interface || '-'"></strong>
                                            </div>
                                            <div>
                                                <span>地址</span>
                                                <strong x-text="(bypassInfo.bypass_list || []).length"></strong>
                                            </div>
                                        </div>
                                        <div class="toolbar-actions">
                                            <button @click="refreshBypass()" :disabled="bypassLoading" class="button">
                                                <svg viewBox="0 0 24 24" aria-hidden="true" :class="bypassLoading ? 'spin' : ''">
                                                    <path d="M17.7 6.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.76-4.24L13 11h8V3z"></path>
                                                </svg>
                                                刷新路由
                                            </button>
                                            <button @click="showAddBypass = true" class="button is-primary">添加</button>
                                        </div>
                                    </div>

                                    <div class="list-panel">
                                        <template x-for="(entry, index) in bypassInfo.bypass_list || []" :key="index">
                                            <div class="list-row">
                                                <div>
                                                    <strong class="mono" x-text="entry.address"></strong>
                                                    <span class="muted" x-text="entry.comment || '无备注'"></span>
                                                </div>
                                                <button @click="removeBypass(entry.address)" class="icon-button is-danger" title="删除">
                                                    <svg viewBox="0 0 24 24" aria-hidden="true">
                                                        <path d="M7 21h10l1-13H6z"></path>
                                                        <path d="M9 4h6l1 2h4v2H4V6h4z"></path>
                                                    </svg>
                                                </button>
                                            </div>
                                        </template>
                                        <div x-show="!bypassInfo.bypass_list || bypassInfo.bypass_list.length === 0"
                                             class="empty-state">暂无绕过地址</div>
                                    </div>
                                </section>
                            </template>

                            <template x-if="settingsSection === 'diagnostics'">
                                <section class="settings-section diagnostics-grid">
                                    <div class="form-panel">
                                        <div class="panel-title-row compact">
                                            <h3>连接</h3>
                                            <div class="toolbar-actions">
                                                <span class="meta-chip" x-text="connections.length + ' 连接'"></span>
                                                <button @click="fetchConnections()" class="button is-small">刷新</button>
                                                <button @click="closeAllConnections()" class="button is-small is-danger">断开全部</button>
                                            </div>
                                        </div>
                                        <div class="table-wrap compact-table">
                                            <table>
                                                <thead>
                                                    <tr>
                                                        <th>主机</th>
                                                        <th>网络</th>
                                                        <th>出口</th>
                                                        <th>下载</th>
                                                        <th>上传</th>
                                                        <th>操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template x-for="conn in connections" :key="conn.id">
                                                        <tr>
                                                            <td>
                                                                <div class="cell-main">
                                                                    <strong x-text="conn.metadata.host || conn.metadata.destinationIP || '-'"></strong>
                                                                    <small x-text="conn.metadata.destinationIP && conn.metadata.host ? conn.metadata.destinationIP : ''"></small>
                                                                </div>
                                                            </td>
                                                            <td><span class="tag" x-text="conn.metadata.network?.toUpperCase()"></span></td>
                                                            <td class="muted" x-text="(conn.chains || []).join(' → ') || '-'"></td>
                                                            <td class="muted" x-text="formatBytes(conn.download)"></td>
                                                            <td class="muted" x-text="formatBytes(conn.upload)"></td>
                                                            <td>
                                                                <button @click="closeConnection(conn.id)" class="button is-small is-danger">断开</button>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                    <tr x-show="connections.length === 0">
                                                        <td colspan="6" class="empty-state compact">暂无活跃连接</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    <div class="form-panel">
                                        <div class="panel-title-row compact">
                                            <h3>日志</h3>
                                            <div class="toolbar-actions">
                                                <input type="text" x-model="logSearch" placeholder="搜索">
                                                <select x-model="logFilter">
                                                    <option value="all">全部</option>
                                                    <option value="dns">DNS</option>
                                                    <option value="outbound">出站</option>
                                                    <option value="urltest">节点</option>
                                                    <option value="important">重要</option>
                                                </select>
                                                <select x-model="logLevel" @change="setLogLevel()">
                                                    <option value="trace">Trace</option>
                                                    <option value="debug">Debug</option>
                                                    <option value="info">Info</option>
                                                    <option value="warn">Warn</option>
                                                    <option value="error">Error</option>
                                                </select>
                                                <button @click="clearLogs()" class="button is-small">清空</button>
                                            </div>
                                        </div>
                                        <div id="log-container" class="log-panel">
                                            <template x-for="(log, index) in filteredLogs" :key="index">
                                                <div class="log-line">
                                                    <span class="muted" x-text="formatLogTime(log.time)"></span>
                                                    <strong :class="{
                                                        'is-error': log.level === 'error' || log.level === 'fatal',
                                                        'is-warn': log.level === 'warn',
                                                        'is-debug': log.level === 'debug',
                                                        'is-trace': log.level === 'trace'
                                                    }" x-text="'[' + log.level.toUpperCase() + ']'"></strong>
                                                    <span x-html="highlightLog(log.message)"></span>
                                                </div>
                                            </template>
                                            <p x-show="filteredLogs.length === 0" class="empty-state compact">暂无匹配日志</p>
                                        </div>
                                    </div>
                                </section>
                            </template>
                        </div>
                    </div>
                </section>
            </main>
        </section>
    </div>

    <div x-show="showAddSubscription" x-cloak class="modal-backdrop" @click.self="showAddSubscription = false">
        <div class="modal-card">
            <h3>添加订阅</h3>
            <label>
                <span>名称</span>
                <input type="text" x-model="newSubscription.name" placeholder="可选">
            </label>
            <label>
                <span>地址</span>
                <input type="url" x-model="newSubscription.url" placeholder="https://...">
            </label>
            <label class="toggle-row">
                <input type="checkbox" x-model="newSubscription.auto_update">
                <span>自动更新</span>
            </label>
            <label x-show="newSubscription.auto_update">
                <span>更新间隔</span>
                <input type="number" x-model.number="newSubscription.update_interval" min="5" placeholder="60">
            </label>
            <div class="modal-actions">
                <button @click="showAddSubscription = false" class="button">取消</button>
                <button @click="addSubscription()" :disabled="!newSubscription.url" class="button is-primary">添加</button>
            </div>
        </div>
    </div>

    <div x-show="showEditSubscription" x-cloak class="modal-backdrop" @click.self="showEditSubscription = false">
        <div class="modal-card">
            <h3>修改订阅</h3>
            <label>
                <span>名称</span>
                <input type="text" x-model="editingSubscription.name">
            </label>
            <label>
                <span>地址</span>
                <input type="url" x-model="editingSubscription.url">
            </label>
            <label class="toggle-row">
                <input type="checkbox" x-model="editingSubscription.auto_update">
                <span>自动更新</span>
            </label>
            <label x-show="editingSubscription.auto_update">
                <span>更新间隔</span>
                <input type="number" x-model.number="editingSubscription.update_interval" min="5">
            </label>
            <div class="modal-actions">
                <button @click="showEditSubscription = false" class="button">取消</button>
                <button @click="updateSubscription()" :disabled="!editingSubscription.url" class="button is-primary">保存</button>
            </div>
        </div>
    </div>

    <div x-show="showAddRule" x-cloak class="modal-backdrop" @click.self="showAddRule = false">
        <div class="modal-card">
            <h3>添加规则</h3>
            <label>
                <span>类型</span>
                <select x-model="newRule.type">
                    <option value="domain">域名</option>
                    <option value="domain_suffix">域名后缀</option>
                    <option value="ip_cidr">IP CIDR</option>
                    <option value="geosite">Geosite</option>
                    <option value="geoip">GeoIP</option>
                </select>
            </label>
            <label>
                <span>值</span>
                <input type="text" x-model="newRule.value" placeholder="example.com">
            </label>
            <label>
                <span>出口</span>
                <select x-model="newRule.outbound">
                    <option value="proxy">代理</option>
                    <option value="direct">直连</option>
                    <option value="block">阻止</option>
                </select>
            </label>
            <div class="modal-actions">
                <button @click="showAddRule = false" class="button">取消</button>
                <button @click="addCustomRule()" :disabled="!newRule.value" class="button is-primary">添加</button>
            </div>
        </div>
    </div>

    <div x-show="showAddBypass" x-cloak class="modal-backdrop" @click.self="showAddBypass = false">
        <div class="modal-card">
            <h3>添加绕过</h3>
            <label>
                <span>地址</span>
                <input type="text" x-model="newBypass.address" placeholder="example.com 或 1.2.3.4">
            </label>
            <label>
                <span>备注</span>
                <input type="text" x-model="newBypass.comment" placeholder="可选">
            </label>
            <div class="modal-actions">
                <button @click="showAddBypass = false" class="button">取消</button>
                <button @click="addBypass()" :disabled="!newBypass.address" class="button is-primary">添加</button>
            </div>
        </div>
    </div>

    <div class="toast-stack">
        <template x-for="(toast, index) in toasts" :key="index">
            <div :class="'toast is-' + toast.type">
                <span x-text="toast.message"></span>
                <button @click="toasts.splice(index, 1)">×</button>
            </div>
        </template>
    </div>

    <script defer src="/static/js/app.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
</body>
</html>
